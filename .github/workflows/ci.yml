name: cli-build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  cli:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: codebase-analyzer-linux
            binary_name: codebase_analyzer
            binary_path: build/stage/bin/codebase_analyzer
          - os: macos-latest
            artifact_name: codebase-analyzer-macos
            binary_name: codebase_analyzer
            binary_path: build/stage/bin/codebase_analyzer
          - os: windows-latest
            artifact_name: codebase-analyzer-windows
            binary_name: codebase_analyzer.exe
            binary_path: build/stage/bin/codebase_analyzer.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --config Release --prefix build/stage

      - name: Smoke test
        run: |
          $exe = Resolve-Path $env:BINARY_PATH
          & $exe.Path $PWD.Path
        env:
          BINARY_PATH: ${{ matrix.binary_path }}

      - name: Prepare package
        run: |
          $packageRoot = Join-Path $PWD.Path build/package
          $demoRoot = Join-Path $packageRoot demo-source
          New-Item -ItemType Directory -Force $demoRoot | Out-Null
          Copy-Item $env:BINARY_PATH (Join-Path $packageRoot $env:BINARY_NAME) -Force
          git ls-files | ForEach-Object {
            $dest = Join-Path $demoRoot $_
            $destDir = Split-Path $dest -Parent
            if ($destDir) {
              New-Item -ItemType Directory -Force $destDir | Out-Null
            }
            Copy-Item $_ $dest -Force
          }
        env:
          BINARY_PATH: ${{ matrix.binary_path }}
          BINARY_NAME: ${{ matrix.binary_name }}

      - name: Package smoke test
        run: |
          $packageRoot = Join-Path $PWD.Path build/package
          $exe = Join-Path $packageRoot $env:BINARY_NAME
          & $exe $packageRoot
          Remove-Item (Join-Path $packageRoot codebase_report.md) -Force
        env:
          BINARY_NAME: ${{ matrix.binary_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: build/package
          if-no-files-found: error
